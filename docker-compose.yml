services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/app.db
      - STORAGE_RAW=/data/storage/raw
      - STORAGE_PROCESSED=/data/storage/processed
      - STORAGE_WATERMARKS=/data/storage/watermarks
    volumes:
      - ./data:/data
    restart: unless-stopped
